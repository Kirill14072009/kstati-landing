<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kstati - Туристический гид</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #4CAF50, #2E7D32);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .card {
            background: white;
            border-radius: 24px;
            padding: 40px 30px;
            text-align: center;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        .logo {
            font-size: 72px;
            margin-bottom: 16px;
        }
        
        h1 {
            color: #4CAF50;
            font-size: 28px;
            margin-bottom: 8px;
        }
        
        .subtitle {
            color: #666;
            font-size: 16px;
            margin-bottom: 24px;
        }
        
        .info {
            background: #f5f5f5;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 24px;
            text-align: left;
        }
        
        .info p {
            color: #333;
            font-size: 14px;
            line-height: 1.6;
        }
        
        .info .highlight {
            color: #4CAF50;
            font-weight: 600;
        }
        
        .buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .btn {
            display: block;
            padding: 16px 24px;
            border-radius: 14px;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: #4CAF50;
            color: white;
        }
        
        .btn-primary:hover {
            background: #388E3C;
            transform: translateY(-2px);
        }
        
        .btn-secondary {
            background: #f5f5f5;
            color: #333;
        }
        
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        
        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">📍</div>
        <h1>Kstati</h1>
        <p class="subtitle">Туристический гид по интересным местам</p>
        
        <div class="info">
            <p>Вы перешли по ссылке на <span class="highlight">достопримечательность</span>.</p>
            <p style="margin-top: 8px;">Чтобы увидеть место на карте и узнать о нём больше, установите приложение <span class="highlight">Kstati</span>.</p>
        </div>
        
        <div class="buttons">
            <a href="#" class="btn btn-primary">
                📲 Скачать для Android
            </a>
            <a href="#" class="btn btn-secondary">
                🍎 Скачать для iOS (скоро)
            </a>
        </div>
        
        <p class="footer">
            После установки приложения ссылка откроется автоматически
        </p>
    </div>
</body>
</html>
