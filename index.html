<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KSTATI — Туристический гид с ИИ</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1A1A2E, #16213E, #0F3460);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container { width: 100%; max-width: 420px; }
        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 40px 30px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        .icon {
            width: 80px; height: 80px;
            background: linear-gradient(135deg, #4CAF50, #2E7D32);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 40px;
            box-shadow: 0 10px 30px rgba(76, 175, 80, 0.3);
        }
        h1 {
            color: white; font-size: 32px; font-weight: 800;
            margin-bottom: 6px; letter-spacing: 2px;
        }
        .subtitle { color: rgba(255,255,255,0.6); font-size: 14px; margin-bottom: 8px; }
        .place-box {
            background: rgba(76, 175, 80, 0.15);
            border: 1px solid rgba(76, 175, 80, 0.3);
            border-radius: 16px; padding: 16px; margin: 20px 0; display: none;
        }
        .place-box .name { color: white; font-weight: 600; font-size: 15px; }
        .place-box .hint { color: rgba(255,255,255,0.5); font-size: 11px; margin-top: 4px; }
        .tags { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin: 20px 0; }
        .tag {
            background: rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.8);
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 12px; font-weight: 500;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .btn-download {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #4CAF50, #2E7D32);
            color: white;
            text-decoration: none;
            border-radius: 16px;
            font-size: 17px;
            font-weight: 700;
            box-shadow: 0 10px 30px rgba(76, 175, 80, 0.4);
            transition: all 0.2s;
            margin-top: 20px;
            cursor: pointer;
        }
        .btn-download:hover { transform: translateY(-2px); box-shadow: 0 15px 40px rgba(76, 175, 80, 0.5); }
        .btn-rustore {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 14px;
            background: rgba(255,255,255,0.1);
            color: white;
            text-decoration: none;
            border-radius: 16px;
            font-size: 15px; font-weight: 600;
            border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.2s;
            margin-top: 10px;
        }
        .version { color: rgba(255,255,255,0.35); font-size: 11px; margin-top: 16px; }
        .footer { display: flex; justify-content: center; gap: 20px; margin-top: 20px; }
        .footer a { color: rgba(255,255,255,0.4); font-size: 11px; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card" id="mainCard">
            <div class="icon">🗺️</div>
            <h1>KSTATI</h1>
            <p class="subtitle">Туристический гид с искусственным интеллектом</p>
            
            <div class="place-box" id="placeBox">
                <div class="name" id="placeName">Загрузка...</div>
                <div class="hint">Откройте это место в приложении KSTATI</div>
            </div>
            
            <div class="tags">
                <span class="tag">🤖 ИИ-рассказы</span>
                <span class="tag">🗺️ Карта</span>
                <span class="tag">🎙️ Экскурсии</span>
                <span class="tag">🏆 Рейтинг</span>
                <span class="tag">📍 Оффлайн</span>
                <span class="tag">🎮 Игра</span>
            </div>
            
            <a href="https://github.com/kirill14072009/kstati-landing/releases/download/v1.0.2/app-release.apk" 
   class="btn-download">
    📥 Скачать APK
</a>
            
            <a href="#" class="btn-rustore">🏪 Скоро в RuStore</a>
            
            <p class="version">Версия 1.0 • Бесплатно • Без рекламы</p>
        </div>
        
        <div class="footer">
            <a href="https://github.com/kirill14072009/kstati-landing">GitHub</a>
            <a href="mailto:support@kstati.app">Поддержка</a>
            <a href="#">Политика</a>
        </div>
    </div>
    
    <script>
        var hash = window.location.hash;
        var placeId = '';
        if (hash && hash.includes('place=')) {
            placeId = hash.replace('#place=', '').split('&')[0];
        }
        if (placeId) {
            document.getElementById('placeBox').style.display = 'block';
            document.getElementById('placeName').textContent = 'Место #' + placeId;
            window.location.href = 'kstati://place/' + placeId;
            setTimeout(function() {
                document.getElementById('placeBox').style.display = 'block';
                document.getElementById('placeName').textContent = '📍 Место #' + placeId;
            }, 2000);
        }
    </script>
</body>
</html>
