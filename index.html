<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kstati</title>
    <script>
        // Получаем ID из хэша
        var placeId = window.location.hash.replace('#place=', '');
        
        if (placeId) {
            // Пробуем открыть через свою схему
            window.location.href = 'kstati://place/' + placeId;
            
            // Если не открылось — показываем страницу через 1 секунду
            setTimeout(function() {
                document.getElementById('content').style.display = 'block';
            }, 1000);
        } else {
            document.getElementById('content').style.display = 'block';
        }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #4CAF50, #2E7D32);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            max-width: 400px;
            display: none;
        }
        h1 { color: #4CAF50; }
        .btn {
            display: block;
            padding: 14px;
            background: #4CAF50;
            color: white;
            border-radius: 12px;
            text-decoration: none;
            margin: 8px 0;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="card" id="content">
        <div style="font-size:64px">📍</div>
        <h1>Kstati</h1>
        <p>Туристический гид</p>
        <p>Установите приложение:</p>
        <a href="#" class="btn">📲 Скачать для Android</a>
    </div>
</body>
</html>
